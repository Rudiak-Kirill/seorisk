<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SEO Risk Check</title>
  <style>
    :root {
      --bg: #f6f3ef;
      --ink: #1d1b18;
      --muted: #6c6256;
      --accent: #c35b2c;
      --card: #fff9f2;
    }
    body {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% 20%, #fff, var(--bg));
    }
    .wrap {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }
    h1 { font-size: 32px; margin: 0 0 12px; }
    p { margin: 0 0 16px; color: var(--muted); }
    .card {
      background: var(--card);
      border: 1px solid #eadfd2;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .row { display: flex; gap: 12px; }
    input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #cdbca8;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      padding: 12px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .mini {
      border: 1px solid #e3d6c7;
      border-radius: 10px;
      padding: 12px;
      background: #fffefb;
    }
    .mini h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    .rowline {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px dashed #eee3d7;
      font-size: 14px;
    }
    .rowline:last-child { border-bottom: none; }
    .bad { color: #b2271d; font-weight: 600; }
    .ok { color: #1e6b3b; font-weight: 600; }
    .verdict {
      margin-top: 16px;
      border: 1px solid #e3d6c7;
      border-radius: 10px;
      padding: 14px;
      background: #fffefb;
    }
    .verdict h3 { margin: 0 0 8px; font-size: 16px; }
    .status { margin-top: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>SEO Risk Check</h1>
    <p>Разовая проверка URL. Ограничение: 1 URL на IP в сутки.</p>
    <div class="card">
      <div class="row">
        <input id="url" placeholder="https://example.com" />
        <button id="btn">Проверить</button>
      </div>
      <div class="status" id="status"></div>
      <div id="output"></div>
    </div>
  </div>
  <script>
    const btn = document.getElementById('btn');
    const out = document.getElementById('output');
    const status = document.getElementById('status');
    const labelMap = {
      http: 'HTTP',
      text_len: 'Текст',
      links: 'Ссылки',
      h1: 'H1',
      title: 'Title'
    };
    const fmt = (snap) => ({
      http: snap.http_code,
      text_len: snap.text_len,
      links: snap.links_count,
      h1: snap.has_h1 ? 'есть' : 'нет',
      title: snap.has_title ? 'есть' : 'нет',
      access: snap.access_state
    });
    const diffSet = (reasons) => new Set(reasons || []);
    const hasDiff = (set, label, kind) => {
      const key = `${label}: ${kind}`;
      return set.has(key);
    };
    const renderCard = (title, snap, diffs) => {
      return `
        <div class="mini">
          <h3>${title}</h3>
          <div class="rowline ${hasDiff(diffs, title, 'http_code') ? 'bad' : ''}">
            <span>${labelMap.http}</span><span>${snap.http}</span>
          </div>
          <div class="rowline ${hasDiff(diffs, title, 'text_diff') ? 'bad' : ''}">
            <span>${labelMap.text_len}</span><span>${snap.text_len}</span>
          </div>
          <div class="rowline ${hasDiff(diffs, title, 'links_diff') ? 'bad' : ''}">
            <span>${labelMap.links}</span><span>${snap.links}</span>
          </div>
          <div class="rowline ${hasDiff(diffs, title, 'h1_diff') ? 'bad' : ''}">
            <span>${labelMap.h1}</span><span>${snap.h1}</span>
          </div>
          <div class="rowline ${hasDiff(diffs, title, 'title_diff') ? 'bad' : ''}">
            <span>${labelMap.title}</span><span>${snap.title}</span>
          </div>
          <div class="rowline">
            <span>Access</span><span>${snap.access || 'ok'}</span>
          </div>
        </div>
      `;
    };
    btn.addEventListener('click', async () => {
      const url = document.getElementById('url').value.trim();
      if (!url) return;
      btn.disabled = true;
      status.textContent = 'Проверяем...';
      out.innerHTML = '';
      try {
        const resp = await fetch(`/api/check.py?url=${encodeURIComponent(url)}`);
        const data = await resp.json();
        if (!resp.ok) {
          status.textContent = data.error || 'Ошибка';
          out.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        } else {
          const checks = {
            browser: fmt(data.checks.browser),
            yandex: fmt(data.checks.yandex),
            google: fmt(data.checks.google)
          };
          const diffs = diffSet(data.reasons);
          status.textContent = data.verdict === 'ok' ? 'ОК' : 'Есть расхождения';
          const verdictText = data.verdict === 'ok'
            ? 'Все версии совпадают.'
            : 'Есть расхождения между браузером и ботами.';
          const reasons = (data.reasons || []).map(r => `<div class="bad">• ${r}</div>`).join('');
          out.innerHTML = `
            <div class="grid">
              ${renderCard('browser', checks.browser, diffs)}
              ${renderCard('yandex', checks.yandex, diffs)}
              ${renderCard('google', checks.google, diffs)}
            </div>
            <div class="verdict">
              <h3>Вердикт</h3>
              <div class="${data.verdict === 'ok' ? 'ok' : 'bad'}">${verdictText}</div>
              ${reasons ? `<div style="margin-top:8px">${reasons}</div>` : ''}
            </div>
          `;
        }
      } catch (e) {
        status.textContent = 'Ошибка сети';
        out.textContent = String(e);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
