name: Deploy to Timeweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /srv/infra/vds-infra/stacks/seorisk
            ./deploy.sh
            curl -fsS --max-time 20 http://127.0.0.1:3000/ >/dev/null
            curl -fsS --max-time 20 http://127.0.0.1:3000/sign-in >/dev/null
            curl -fsS --max-time 20 http://127.0.0.1:3000/tools/ssr-check >/dev/null
