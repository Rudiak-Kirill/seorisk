name: Deploy to Timeweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            TARGET_SHA="${{ github.sha }}"

            echo "Disk usage before cleanup:"
            df -h /
            docker system df || true

            docker builder prune -af >/dev/null 2>&1 || true
            docker image prune -af >/dev/null 2>&1 || true

            echo "Disk usage after cleanup:"
            df -h /

            git -C /srv/infra/vds-infra fetch origin
            git -C /srv/infra/vds-infra checkout main
            git -C /srv/infra/vds-infra reset --hard origin/main

            cd /srv/infra/vds-infra/stacks/seorisk
            test -x ./deploy.sh
            ./deploy.sh

            DEPLOYED_SHA="$(git -C /srv/apps/seorisk rev-parse HEAD)"
            echo "Target SHA: ${TARGET_SHA}"
            echo "Deployed SHA: ${DEPLOYED_SHA}"
            test "${DEPLOYED_SHA}" = "${TARGET_SHA}"

            echo "Container status:"
            docker ps --format 'table {{.Names}}\t{{.Status}}' | grep '^seorisk-'

            echo "Health checks:"
            for path in / /sign-in /tools/ssr-check /tools/llm-check /tools/index-check /robots.txt /sitemap.xml; do
              ok=0
              for attempt in 1 2 3 4 5; do
                code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 "http://127.0.0.1:3000${path}" || true)"
                echo "${path} [attempt ${attempt}] -> ${code}"
                case "${code}" in
                  200|301|302)
                    ok=1
                    break
                    ;;
                esac
                sleep 3
              done

              if [ "${ok}" -ne 1 ]; then
                echo "Health check failed for ${path}"
                exit 1
              fi
            done
